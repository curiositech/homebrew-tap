name: Update formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: vars
        env:
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          VERSION="${PAYLOAD_VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${PAYLOAD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download binaries and compute sha256
        id: sha
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          BASE="https://github.com/curiositech/port-daddy/releases/download/${TAG}"

          curl -fsSL "${BASE}/pd-darwin-arm64.tar.gz" -o arm64.tar.gz
          ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')

          curl -fsSL "${BASE}/pd-linux-x64.tar.gz" -o linux.tar.gz
          LINUX=$(sha256sum linux.tar.gz | awk '{print $1}')

          # pd-console.app — only present from the release that first shipped the
          # build-pd-console-app job (#493). Tolerate its absence so older / daemon-
          # only releases still roll the formula instead of failing the whole run.
          if curl -fsSL "${BASE}/PortDaddy-Console-macOS-arm64.zip" -o console.zip; then
            CONSOLE=$(sha256sum console.zip | awk '{print $1}')
          else
            CONSOLE=""
            echo "::notice::no pd-console.app in ${TAG} — skipping cask refresh"
          fi

          echo "arm64=${ARM64}" >> "$GITHUB_OUTPUT"
          echo "linux=${LINUX}" >> "$GITHUB_OUTPUT"
          echo "console=${CONSOLE}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          ARM64: ${{ steps.sha.outputs.arm64 }}
          LINUX: ${{ steps.sha.outputs.linux }}
        run: |
          FORMULA="Formula/port-daddy.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update sha256 placeholders / previous values.
          # Body of the heredoc MUST be indented at the YAML literal-block
          # indent level (10 spaces here) so the surrounding `run: |` keeps
          # parsing. Without that, YAML treats the first column-0 line as a
          # block exit and the whole workflow file fails to parse — which is
          # how this file shipped broken for three days, with every
          # repository_dispatch silently dropped.
          python3 - <<'PYEOF'
          import os, re

          formula = open("Formula/port-daddy.rb").read()
          arm64 = os.environ["ARM64"]
          linux = os.environ["LINUX"]

          # The formula only has two sha256 lines (darwin-arm64 then linux-x64).
          # darwin-x64 was dropped from the release matrix on 2026-05-22 because
          # macos-13 GHA runners routinely wedge for 24h. Don't touch a third
          # match; there isn't one.
          def replace_nth_sha(text, n, new_sha):
              matches = list(re.finditer(r'sha256 "[a-fA-F0-9]+"', text))
              if len(matches) < n:
                  matches = list(re.finditer(r'sha256 "PLACEHOLDER_[A-Z0-9_]+"', text))
              if len(matches) < n:
                  return text
              m = matches[n - 1]
              return text[:m.start()] + f'sha256 "{new_sha}"' + text[m.end():]

          formula = replace_nth_sha(formula, 1, arm64)   # darwin-arm64
          formula = replace_nth_sha(formula, 2, linux)   # linux-x64

          open("Formula/port-daddy.rb", "w").write(formula)
          PYEOF

      - name: Update console cask
        if: steps.sha.outputs.console != ''
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          CONSOLE: ${{ steps.sha.outputs.console }}
        run: |
          CASK="Casks/port-daddy-console.rb"
          # The cask has exactly one version line and one sha256 line — a plain
          # sed is sufficient (no nth-match dance like the formula).
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$CASK"
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${CONSOLE}\"/" "$CASK"

      - name: Commit and push
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/port-daddy.rb Casks/port-daddy-console.rb
          # Casks/ only changes on releases that shipped a console .app; commit
          # whatever is staged, and no-op cleanly if nothing changed.
          git diff --cached --quiet || git commit -m "chore: bump port-daddy to v${VERSION}"
          git push
